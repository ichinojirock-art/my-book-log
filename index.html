<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Book Log Ultra V12</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        
        .btn { padding: 10px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex: 1; min-height: 48px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-export { border-color: var(--success); color: var(--success); }
        
        .main-action-grid { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

        /* スキャナUI */
        #scannerArea { background: black; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; }
        #interactive { width: 100%; }
        #interactive video { width: 100%; display: block; }
        #interactive canvas { display: none; }

        /* カメラモード切替 */
        .scan-mode-bar { display: flex; gap: 6px; margin-bottom: 10px; }
        .scan-mode-btn { flex: 1; padding: 8px; border: 1px solid var(--primary); border-radius: 8px; background: white; color: var(--primary); font-weight: bold; font-size: 13px; cursor: pointer; }
        .scan-mode-btn.active { background: var(--primary); color: white; }

        /* 撮影ボタン */
        #captureBtn { width: 64px; height: 64px; border-radius: 50%; background: white; border: 4px solid var(--primary); position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 10; }

        /* 撮影した画像プレビュー */
        #capturePreview { width: 100%; border-radius: 8px; display: block; }

        /* ISBN確認バナー */
        #isbnConfirmBanner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
        #isbnConfirmBanner .isbn-value { font-size: 22px; font-weight: bold; letter-spacing: 2px; text-align: center; margin: 8px 0; color: #333; font-family: monospace; }
        #isbnConfirmBanner .btn-row { display: flex; gap: 8px; margin-top: 10px; }

        /* カレンダー */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ccc; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        .calendar-day { background: white; min-height: 60px; padding: 4px 2px; font-size: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .calendar-day.active { background: #e8f0fe; font-weight: bold; box-shadow: inset 0 0 0 2px var(--primary); }
        .count-badge { display: block; background: var(--primary); color: white; border-radius: 10px; font-size: 9px; padding: 2px 4px; margin-top: 4px; width: fit-content; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; width: 92%; max-width: 400px; border-radius: 16px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        .modal-footer { display: flex; gap: 12px; margin-top: 20px; }
        .btn-confirm { background: var(--success); color: white; min-height: 54px; flex: 1; }
        .btn-cancel { background: var(--danger); color: white; min-height: 54px; flex: 1; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }

        .search-box { display: flex; gap: 8px; align-items: flex-start; }
        .btn-search { background: #5f6368; color: white; flex: none; width: 70px; height: 44px; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; }

        .search-results { background: #ffffff; border-radius: 8px; margin-bottom: 15px; max-height: 250px; overflow-y: auto; display: none; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; align-items: center; font-size: 13px; }
        .search-item img { width: 40px; height: auto; border-radius: 2px; }
        .search-item:hover { background: #f8f9fa; }
        .search-nomatch { color: #888; font-size: 12px; font-style: italic; padding: 2px 10px 8px; }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .book-card { background: white; padding: 12px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .book-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        .book-info { font-size: 13px; line-height: 1.4; flex-grow: 1; }
        .book-meta { font-size: 11px; color: #666; margin: 4px 0; }
        .book-comment { font-size: 12px; color: #444; border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; font-style: italic; }
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }

        .status-msg { font-size: 13px; color: #666; padding: 6px 0; text-align: center; }
    </style>
</head>
<body>

    <h1>📚 My Book Log</h1>

    <div class="main-action-grid">
        <button id="scanToggleBtn" class="btn btn-main" onclick="toggleScanner()">📷 スキャン</button>
        <button class="btn btn-sub" onclick="openManualEntry()">✍️ 手動登録</button>
        <button class="btn btn-sub btn-export" onclick="exportToCSV()">📊 CSV</button>
    </div>

    <!-- スキャナエリア -->
    <div id="scannerArea" class="hidden">
        <!-- モード切替タブ -->
        <div class="scan-mode-bar">
            <button id="modeLiveBtn" class="scan-mode-btn active" onclick="setScanMode('live')">🎥 リアルタイム</button>
            <button id="modePhotoBtn" class="scan-mode-btn" onclick="setScanMode('photo')">📸 撮影して読取</button>
        </div>

        <!-- リアルタイムモード -->
        <div id="liveMode">
            <div id="interactive" style="position:relative; background:black; border-radius:10px; overflow:hidden;"></div>
            <p class="status-msg" id="liveScanStatus">バーコードをカメラに向けてください</p>
        </div>

        <!-- 撮影モード -->
        <div id="photoMode" class="hidden">
            <!-- カメラビュー（撮影前のみ表示） -->
            <div id="cameraViewArea" style="position:relative; background:black; border-radius:10px; overflow:hidden; min-height:220px;">
                <video id="photoVideo" style="width:100%; display:block;" autoplay playsinline></video>
                <button id="captureBtn" onclick="capturePhoto()">📸</button>
            </div>
            <canvas id="captureCanvas" style="display:none;"></canvas>
            <!-- 撮影結果ビュー（撮影後のみ表示） -->
            <div id="captureResultArea" class="hidden">
                <img id="capturePreview" alt="撮影画像" style="width:100%; border-radius:10px; display:block;">
                <p class="status-msg" id="captureStatus">解析中...</p>
            </div>
        </div>

        <!-- ISBN確認バナー（両モード共通） -->
        <div id="isbnConfirmBanner" class="hidden">
            <div style="font-size:13px; color:#856404;">📌 読み取ったISBN — 正しければ「この番号で検索」を押してください</div>
            <div class="isbn-value" id="isbnDisplayValue">—</div>
            <div class="btn-row">
                <button class="btn btn-main" style="min-height:44px;" onclick="searchByConfirmedIsbn()">この番号で検索</button>
                <button class="btn btn-sub" style="min-height:44px;" onclick="retryScanning()">やり直す</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button class="btn btn-sub" onclick="setView('card')">カード</button>
            <button class="btn btn-sub" onclick="setView('table')">表</button>
            <button class="btn btn-sub" onclick="setView('calendar')">カレンダー</button>
        </div>
        <select id="genreFilter" onchange="render()"><option value="all">すべてのジャンル</option></select>
    </div>

    <div id="calendarArea" class="card hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button class="btn btn-sub" style="flex:none; width:60px;" onclick="changeMonth(-1)">◀</button>
            <span id="currentMonthLabel" style="font-weight:bold; font-size:16px;"></span>
            <button class="btn btn-sub" style="flex:none; width:60px;" onclick="changeMonth(1)">▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div id="listDisplay"></div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; text-align:center;">書籍情報の登録</h3>
            <label>タイトル（複数ワード可）</label>
            <div class="search-box">
                <input type="text" id="fTitle" placeholder="作品名、著者名など...">
                <button class="btn btn-search" onclick="searchBooks()">検索</button>
            </div>
            <div id="searchResults" class="search-results"></div>
            
            <label>著者名</label><input type="text" id="fAuthor">
            <label>記録日</label><input type="date" id="fDate">
            <label>ジャンル</label>
            <input type="text" id="fGenre" list="genreOptions">
            <datalist id="genreOptions"></datalist>
            <label>コメント</label><textarea id="fComment" rows="2"></textarea>
            <input type="hidden" id="fIsbn">
            
            <div class="modal-footer">
                <button class="btn btn-confirm" onclick="saveData()">保存</button>
                <button class="btn btn-cancel" onclick="closeModal()">中止</button>
            </div>
        </div>
    </div>

<script>
    let books = JSON.parse(localStorage.getItem('myBooks')) || [];
    let genres = JSON.parse(localStorage.getItem('myGenres')) || ["未分類"];
    let currentView = 'card';
    let editingIndex = -1; 
    let calDate = new Date();
    let filterDate = null;

    // スキャナ状態
    let scannerOpen = false;
    let currentScanMode = 'live'; // 'live' | 'photo'
    let liveQuaggaRunning = false;
    let photoStream = null;
    let pendingIsbn = null; // 確認待ちのISBN

    // 正規化関数：全角半角・記号・空白を無視して比較
    function normalizeText(text) { 
        return (text || "").normalize("NFKC").toLowerCase().replace(/[\s\(\)\[\]（）「」『』【】！？!?・]/g, ""); 
    }

    // ========== スキャナ全体の開閉 ==========
    function toggleScanner() {
        const area = document.getElementById('scannerArea');
        if (!scannerOpen) {
            scannerOpen = true;
            area.classList.remove('hidden');
            document.getElementById('scanToggleBtn').innerText = "⏹ 停止";
            setScanMode(currentScanMode);
        } else {
            stopAllScanning();
            area.classList.add('hidden');
            scannerOpen = false;
            document.getElementById('scanToggleBtn').innerText = "📷 スキャン";
        }
    }

    function stopAllScanning() {
        if (liveQuaggaRunning) { try { Quagga.stop(); } catch(e){} liveQuaggaRunning = false; }
        if (photoStream) { photoStream.getTracks().forEach(t => t.stop()); photoStream = null; }
        hideBanner();
    }

    // スキャナUIを閉じる専用関数（toggleScannerと状態を共有しない）
    function closeScanner() {
        stopAllScanning();
        document.getElementById('scannerArea').classList.add('hidden');
        document.getElementById('scanToggleBtn').innerText = "📷 スキャン";
        scannerOpen = false;
    }

    // ========== モード切替 ==========
    function setScanMode(mode) {
        currentScanMode = mode;
        stopAllScanning();
        hideBanner();

        document.getElementById('modeLiveBtn').classList.toggle('active', mode === 'live');
        document.getElementById('modePhotoBtn').classList.toggle('active', mode === 'photo');
        document.getElementById('liveMode').classList.toggle('hidden', mode !== 'live');
        document.getElementById('photoMode').classList.toggle('hidden', mode !== 'photo');
        document.getElementById('captureResultArea').classList.add('hidden');

        if (mode === 'live') startLiveScanner();
        else startPhotoCamera();
    }

    // ========== リアルタイムスキャン ==========
    function startLiveScanner() {
        const el = document.getElementById('interactive');
        document.getElementById('liveScanStatus').textContent = 'カメラを起動中...';
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: el, constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader"] }
        }, (err) => {
            if (err) { document.getElementById('liveScanStatus').textContent = 'カメラを起動できませんでした'; return; }
            Quagga.start();
            liveQuaggaRunning = true;
            document.getElementById('liveScanStatus').textContent = 'バーコードをカメラに向けてください';
        });
    }

    Quagga.onDetected((data) => {
        if (!liveQuaggaRunning) return;
        const code = data.codeResult.code;
        if (code && code.startsWith('978')) {
            Quagga.stop();
            liveQuaggaRunning = false;
            document.getElementById('liveScanStatus').textContent = '読み取り完了！';
            showIsbnBanner(code);
        }
    });

    // ========== 撮影モード ==========
    async function startPhotoCamera() {
        try {
            photoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('photoVideo').srcObject = photoStream;
        } catch(e) {
            alert('カメラへのアクセスができませんでした');
        }
    }

    function capturePhoto() {
        const video = document.getElementById('photoVideo');
        const canvas = document.getElementById('captureCanvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // カメラストリームを即停止してビューを切り替え
        if (photoStream) { photoStream.getTracks().forEach(t => t.stop()); photoStream = null; }
        document.getElementById('cameraViewArea').classList.add('hidden');
        const dataUrl = canvas.toDataURL('image/jpeg');
        document.getElementById('capturePreview').src = dataUrl;
        document.getElementById('captureResultArea').classList.remove('hidden');
        document.getElementById('captureStatus').textContent = '解析中...';
        hideBanner();

        // 静止画でQuagga解析
        Quagga.decodeSingle({
            decoder: { readers: ["ean_reader"] },
            locate: true,
            src: dataUrl
        }, (result) => {
            if (result && result.codeResult && result.codeResult.code && result.codeResult.code.startsWith('978')) {
                document.getElementById('captureStatus').textContent = '読み取り完了！';
                showIsbnBanner(result.codeResult.code);
            } else {
                document.getElementById('captureStatus').textContent = '⚠️ バーコードを検出できませんでした。';
            }
        });
    }

    // ========== ISBN確認バナー ==========
    function showIsbnBanner(isbn) {
        pendingIsbn = isbn;
        document.getElementById('isbnDisplayValue').textContent = isbn;
        document.getElementById('isbnConfirmBanner').classList.remove('hidden');
    }

    function hideBanner() {
        pendingIsbn = null;
        document.getElementById('isbnConfirmBanner').classList.add('hidden');
    }

    async function searchByConfirmedIsbn() {
        if (!pendingIsbn) return;
        const isbn = pendingIsbn;
        hideBanner();
        document.getElementById('isbnConfirmBanner').classList.remove('hidden');
        document.getElementById('isbnConfirmBanner').innerHTML = `<div style="text-align:center; padding:10px; color:#555;">🔍 ISBN ${isbn} を検索中...</div>`;

        try {
            // ① Google Books APIで検索
            let bookData = null;
            const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const gJson = await gRes.json();

            if (gJson.items && gJson.items.length > 0) {
                const info = gJson.items[0].volumeInfo;
                bookData = {
                    title: info.title || "",
                    author: info.authors?.[0] || "",
                    img: info.imageLinks?.thumbnail || "",
                    isbn: isbn
                };
            } else {
                // ② Google Booksになければ国立国会図書館APIで検索（フォールバック）
                const ndlRes = await fetch(`https://iss.ndl.go.jp/api/opensearch?isbn=${isbn}&cnt=1`);
                const ndlText = await ndlRes.text();
                const parser = new DOMParser();
                const ndlDoc = parser.parseFromString(ndlText, "application/xml");
                const item = ndlDoc.querySelector("item");
                if (item) {
                    const title = item.querySelector("title")?.textContent || "";
                    const author = item.querySelector("author")?.textContent || "";
                    bookData = { title, author, img: "", isbn };
                }
            }

            hideBanner(); // 「検索中」表示を消す

            if (bookData) {
                closeScanner();
                openModal({
                    ...bookData,
                    date: new Date().toISOString().split('T')[0],
                    genre: "",
                    comment: ""
                }, -1);
            } else {
                // 両APIで見つからなかった
                showIsbnBanner(isbn); // バナーを再表示してISBNを保持
                const goManual = confirm(`ISBN: ${isbn} で検索しましたが、どのデータベースにも見つかりませんでした。\n手動で情報を入力しますか？`);
                if (goManual) {
                    closeScanner();
                    openModal({ title: "", author: "", date: new Date().toISOString().split('T')[0], img: "", genre: "", comment: "", isbn: isbn }, -1);
                } else {
                    retryScanning();
                }
            }
        } catch(e) {
            hideBanner();
            alert('通信エラーが発生しました。ネットワーク接続を確認してください。');
            showIsbnBanner(isbn);
        }
    }

    function retryScanning() {
        hideBanner();
        if (currentScanMode === 'live') {
            startLiveScanner();
        } else {
            // 撮影モード：カメラを再起動してビューを戻す
            document.getElementById('captureResultArea').classList.add('hidden');
            document.getElementById('captureStatus').textContent = '解析中...';
            document.getElementById('cameraViewArea').classList.remove('hidden');
            startPhotoCamera();
        }
    }

    // ========== タイトル検索 ==========
    // 【修正点】
    //   元コード: filtered が空のとき json.items.slice(0,5) を表示していた
    //            → タイトルに含まれないものまで表示されていた
    //   修正後:  タイトルのみに対するマッチを優先し、
    //            一致ゼロの場合は「見つかりませんでした」と表示する
    //   追加:    タイトルマッチしないが著者・説明文にマッチするものは「関連候補」として区切って表示
    async function searchBooks() {
        const query = document.getElementById('fTitle').value.trim();
        const resArea = document.getElementById('searchResults');
        if (!query) return;

        resArea.innerHTML = "<div style='padding:10px'>検索中...</div>";
        resArea.style.display = "block";

        const keywords = query.split(/\s+/).map(kw => normalizeText(kw));

        try {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=40`);
            const json = await res.json();
            
            if (!json.items || json.items.length === 0) {
                resArea.innerHTML = "<div style='padding:10px'>見つかりませんでした</div>";
                return;
            }

            // タイトルに全キーワードが含まれるものを「完全一致候補」とする
            const titleMatched = json.items.filter(item => {
                const normTitle = normalizeText(item.volumeInfo.title);
                return keywords.every(kw => normTitle.includes(kw));
            });

            // タイトル不一致でも著者名を含む場合は「関連候補」とする
            const titleMatchedSet = new Set(titleMatched.map(i => i.id));
            const relatedMatched = json.items.filter(item => {
                if (titleMatchedSet.has(item.id)) return false;
                const normAuthor = normalizeText(item.volumeInfo.authors?.[0] || "");
                return keywords.every(kw => normAuthor.includes(kw));
            });

            if (titleMatched.length === 0 && relatedMatched.length === 0) {
                resArea.innerHTML = "<div style='padding:10px'>タイトルに一致する書籍が見つかりませんでした<br><small style='color:#999'>（APIの検索結果に類似書籍が含まれますが、タイトルが一致しないため除外しています）</small></div>";
                return;
            }

            const renderItem = item => {
                const info = item.volumeInfo;
                const img = info.imageLinks?.thumbnail || "";
                const isbn = info.industryIdentifiers?.find(id => id.type === "ISBN_13")?.identifier || "";
                const safeTitle = (info.title || "").replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                const safeAuthor = (info.authors?.[0] || "不明").replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                const safeImg = (img || "").replace(/'/g, "\\'");
                return `<div class="search-item" onclick="selectSearchBook('${safeTitle}', '${safeAuthor}', '${safeImg}', '${isbn}')">
                    <img src="${img || 'https://via.placeholder.com/40x60'}" onerror="this.src='https://via.placeholder.com/40x60'">
                    <div><strong>${info.title}</strong><br><small>${info.authors?.[0] || ""}</small></div>
                </div>`;
            };

            let html = titleMatched.map(renderItem).join('');

            if (relatedMatched.length > 0) {
                html += `<div class="search-nomatch">── 著者名一致（タイトル不一致）──</div>`;
                html += relatedMatched.slice(0, 5).map(renderItem).join('');
            }

            resArea.innerHTML = html;
        } catch(e) {
            resArea.innerHTML = "<div style='padding:10px'>エラーが発生しました</div>";
        }
    }

    function selectSearchBook(t, a, i, isbn) {
        document.getElementById('fTitle').value = t; 
        document.getElementById('fAuthor').value = a;
        document.getElementById('fIsbn').value = isbn; 
        document.getElementById('editModal').dataset.img = i;
        document.getElementById('searchResults').style.display = "none";
    }

    function openManualEntry() {
        openModal({ title:"", author:"", date: new Date().toISOString().split('T')[0], genre:"", comment:"", img:"", isbn:"" }, -1);
    }

    function openModal(data, index) {
        editingIndex = index;
        document.getElementById('fTitle').value = data.title;
        document.getElementById('fAuthor').value = data.author;
        document.getElementById('fDate').value = data.date;
        document.getElementById('fGenre').value = data.genre;
        document.getElementById('fComment').value = data.comment;
        document.getElementById('fIsbn').value = data.isbn || "";
        document.getElementById('editModal').dataset.img = data.img;
        document.getElementById('editModal').style.display = 'flex';
        updateGenreDatalist();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function saveData() {
        const genre = document.getElementById('fGenre').value || "未分類";
        if (!genres.includes(genre)) { genres.push(genre); localStorage.setItem('myGenres', JSON.stringify(genres)); }
        const data = {
            title: document.getElementById('fTitle').value,
            author: document.getElementById('fAuthor').value,
            date: document.getElementById('fDate').value,
            genre: genre,
            comment: document.getElementById('fComment').value,
            img: document.getElementById('editModal').dataset.img || "",
            isbn: document.getElementById('fIsbn').value
        };
        if (editingIndex > -1) books[editingIndex] = data; else books.unshift(data);
        localStorage.setItem('myBooks', JSON.stringify(books));
        closeModal(); render();
    }

    function deleteBook(idx) {
        if (confirm("本当に削除しますか？")) { books.splice(idx, 1); localStorage.setItem('myBooks', JSON.stringify(books)); render(); }
    }

    function setView(v) { currentView = v; filterDate = null; render(); }

    function render() {
        const listEl = document.getElementById('listDisplay');
        const calArea = document.getElementById('calendarArea');
        const gFilter = document.getElementById('genreFilter').value;
        let filtered = books.map((b, i) => ({...b, originalIndex: i}));
        if (gFilter !== 'all') filtered = filtered.filter(b => b.genre === gFilter);

        calArea.classList.toggle('hidden', currentView !== 'calendar');
        if (currentView === 'calendar') {
            const prefix = `${calDate.getFullYear()}-${String(calDate.getMonth() + 1).padStart(2, '0')}`;
            renderCalendar();
            filtered = filterDate ? filtered.filter(b => b.date === filterDate) : filtered.filter(b => b.date.startsWith(prefix));
        }

        if (currentView === 'table') {
            listEl.innerHTML = `<table style="width:100%; border-collapse:collapse; font-size:13px; background:white; border-radius:12px; overflow:hidden;">
                ${filtered.map(b => `<tr style="border-bottom:1px solid #eee">
                    <td style="padding:10px 5px"><img src="${b.img || 'https://via.placeholder.com/40x60'}" style="width:45px; border-radius:4px;"></td>
                    <td style="padding:10px 5px"><strong>${b.title}</strong><br><small>${b.author} | ${b.date}</small></td>
                    <td style="text-align:right; padding:10px 5px">
                        <button onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})" class="btn-sub" style="padding:4px 8px; min-height:30px; font-size:12px;">編集</button>
                    </td></tr>`).join('')}</table>`;
        } else if (currentView !== 'calendar' || true) {
            listEl.innerHTML = `<div class="book-grid">${filtered.map(b => `
                <div class="book-card">
                    <img src="${b.img || 'https://via.placeholder.com/150x200'}" onerror="this.src='https://via.placeholder.com/150x200'">
                    <div class="book-info">
                        <strong>${b.title}</strong><br><small>${b.author}</small>
                        <div class="book-meta">${b.date} / ${b.genre}</div>
                        ${b.comment ? `<div class="book-comment">${b.comment}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})" class="btn btn-sub" style="min-height:36px; font-size:12px;">編集</button>
                        <button onclick="deleteBook(${b.originalIndex})" class="btn btn-sub" style="min-height:36px; font-size:12px; color:red; border-color:red;">削除</button>
                    </div>
                </div>`).join('')}</div>`;
        }
        updateGenreFilter();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const year = calDate.getFullYear(); const month = calDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${year}年 ${month + 1}月`;
        grid.innerHTML = "";
        const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < first; i++) grid.innerHTML += `<div style="background:white"></div>`;
        for (let d = 1; d <= last; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = books.filter(b => b.date === dStr).length;
            grid.innerHTML += `<div class="calendar-day ${filterDate===dStr?'active':''}" onclick="filterByDate('${dStr}')">
                ${d}${count>0?`<span class="count-badge">${count}</span>`:''}
            </div>`;
        }
    }

    function filterByDate(d) { filterDate = filterDate === d ? null : d; render(); }
    function changeMonth(n) { calDate.setMonth(calDate.getMonth() + n); filterDate = null; render(); }

    function updateGenreFilter() {
        const sel = document.getElementById('genreFilter');
        const current = sel.value;
        sel.innerHTML = `<option value="all">すべてのジャンル</option>` + genres.map(g => `<option value="${g}">${g}</option>`).join('');
        sel.value = current;
    }
    function updateGenreDatalist() {
        document.getElementById('genreOptions').innerHTML = genres.map(g => `<option value="${g}">${g}</option>`).join('');
    }
    function exportToCSV() {
        let csv = "タイトル,著者,日付,ジャンル,コメント,ISBN\n";
        books.forEach(b => csv += [b.title, b.author, b.date, b.genre, b.comment, b.isbn].map(v => `"${(v||"").replace(/"/g,'""')}"`).join(",") + "\n");
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `books_backup.csv`; a.click();
    }

    render();
</script>
</body>
</html>
