<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ホンログ</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        .btn { padding: 8px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex: 1; min-height: 40px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .main-action-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        #scannerArea { background: black; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; }
        #interactive { width: 100%; }
        #interactive video { width: 100%; display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ccc; border: 1px solid #ccc; }
        .calendar-day { background: white; height: 45px; padding: 2px; font-size: 11px; text-align: center; cursor: pointer; position: relative; }
        .calendar-day.active { background: #e8f0fe; box-shadow: inset 0 0 0 2px var(--primary); }
        .count-badge { background: var(--primary); color: white; border-radius: 10px; font-size: 9px; padding: 1px 4px; position: absolute; bottom: 2px; right: 2px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; width: 92%; max-width: 400px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .book-card { background: white; padding: 12px; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .book-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        .book-info { font-size: 13px; line-height: 1.4; flex-grow: 1; }
        .book-meta { font-size: 11px; color: #666; margin-top: 4px; }
        .book-comment { font-size: 12px; color: #444; border-top: 1px solid #eee; padding-top: 6px; margin-top: 6px; font-style: italic; }
        .card-actions { display: flex; gap: 4px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <h1 style="margin:0; font-size:20px;">📚 ホンログ</h1>
        <button class="btn btn-sub btn-export" style="flex:none; width:80px;" onclick="document.getElementById('csvModal').style.display='flex'">📊 CSV</button>
    </div>

    <div class="main-action-grid">
        <button id="scanToggleBtn" class="btn btn-main" onclick="toggleScanner()">📷 スキャン</button>
        <button class="btn btn-sub" onclick="openManualEntry()">✍️ 手動登録</button>
    </div>

    <div id="scannerArea" class="hidden">
        <div id="interactive"></div>
        <p style="color:white; text-align:center; font-size:12px; padding:10px;">バーコードを枠に合わせてください</p>
    </div>

    <div style="background:white; padding:10px; border-radius:12px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button class="btn btn-sub" onclick="setView('card')">カード</button>
            <button class="btn btn-sub" onclick="setView('table')">表</button>
            <button class="btn btn-sub" onclick="setView('calendar')">カレンダー</button>
        </div>
        <select id="genreFilter" onchange="render()"><option value="all">すべてのジャンル</option></select>
    </div>

    <div id="calendarArea" class="hidden" style="margin-bottom:15px;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button onclick="changeMonth(-1)">◀</button>
            <span id="currentMonthLabel" style="font-weight:bold;"></span>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <button id="shareBtn" class="btn btn-main" style="margin-top:10px;" onclick="openShareModal()">📷 画像として保存</button>
    </div>

    <div id="listDisplay"></div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">書籍登録</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="fTitle" placeholder="タイトルを入力または検索...">
                <button class="btn btn-main" style="flex:none; width:60px;" onclick="searchBooks()">検索</button>
            </div>
            <div id="searchResults" style="display:none; border:1px solid #ccc; max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
            <label>著者</label><input type="text" id="fAuthor">
            <label>日付</label><input type="date" id="fDate">
            <label>ジャンル</label><input type="text" id="fGenre" list="genreOptions"><datalist id="genreOptions"></datalist>
            <label>コメント</label><textarea id="fComment" rows="2"></textarea>
            <input type="hidden" id="fIsbn">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-main" onclick="saveData()">保存</button>
                <button class="btn btn-sub" onclick="closeModal()">中止</button>
            </div>
        </div>
    </div>

    <div id="csvModal" class="modal" onclick="if(event.target===this)this.style.display='none'">
        <div class="modal-content">
            <h3>📊 CSV連携</h3>
            <button class="btn btn-main" style="width:100%; margin-bottom:15px;" onclick="exportToCSV()">📤 CSV書き出し</button>
            <label style="display:block; border:2px dashed #ccc; padding:20px; text-align:center;">
                📥 CSV読み込み
                <input type="file" accept=".csv" style="display:none;" onchange="importFromCSV(event)">
            </label>
        </div>
    </div>

    <div id="shareModal" class="modal" onclick="if(event.target===this)this.style.display='none'">
        <div class="modal-content">
            <h3>📷 保存形式を選択</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-main" onclick="generateShareImage(true)">🖼️ 書影あり</button>
                <button class="btn btn-sub" onclick="generateShareImage(false)">📋 リストのみ</button>
            </div>
            <div id="shareProgress" style="display:none; margin-top:15px; text-align:center;">生成中...</div>
            <div id="sharePreviewArea" class="hidden" style="margin-top:15px;">
                <img id="sharePreviewImg" style="width:100%; border:1px solid #eee;">
                <a id="shareDownloadLink" download="honlog_share.png"><button class="btn btn-main" style="width:100%; margin-top:10px;">⬇️ 画像を保存</button></a>
            </div>
        </div>
    </div>

<script>
    let books = JSON.parse(localStorage.getItem('myBooks')) || [];
    let genres = JSON.parse(localStorage.getItem('myGenres')) || ["未分類"];
    let currentView = 'card';
    let editingIndex = -1; 
    let calDate = new Date();
    let filterDate = null;

    const NO_IMAGE_SRC = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="140"><rect width="100" height="140" fill="#ddd"/><text x="50" y="75" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">NO IMAGE</text></svg>`);

    function getBookLink(b) {
        return (b.isbn && b.isbn.length > 5) ? `https://www.google.com/search?q=isbn:${b.isbn}&tbm=bks` : null;
    }

    function toggleScanner() {
        const area = document.getElementById('scannerArea');
        if (area.classList.contains('hidden')) {
            area.classList.remove('hidden');
            Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: "#interactive", constraints: { facingMode: "environment" } }, decoder: { readers: ["ean_reader"] } }, (err) => {
                if(!err) Quagga.start();
            });
        } else {
            Quagga.stop();
            area.classList.add('hidden');
        }
    }

    Quagga.onDetected((data) => {
        const code = data.codeResult.code;
        if (code && code.startsWith('978')) {
            Quagga.stop();
            document.getElementById('scannerArea').classList.add('hidden');
            autoSearchByIsbn(code);
        }
    });

    async function autoSearchByIsbn(isbn) {
        try {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const json = await res.json();
            if (json.items) {
                const info = json.items[0].volumeInfo;
                openModal({ title: info.title, author: info.authors?.[0]||"", img: info.imageLinks?.thumbnail||"", isbn, date: new Date().toISOString().split('T')[0], genre: "", comment: "" }, -1);
            }
        } catch(e) { alert("書籍情報が見つかりませんでした"); }
    }

    function openModal(data, index) {
        editingIndex = index;
        document.getElementById('fTitle').value = data.title;
        document.getElementById('fAuthor').value = data.author;
        document.getElementById('fDate').value = data.date;
        document.getElementById('fGenre').value = data.genre;
        document.getElementById('fComment').value = data.comment;
        document.getElementById('fIsbn').value = data.isbn || "";
        document.getElementById('editModal').dataset.img = data.img || "";
        document.getElementById('editModal').style.display = 'flex';
        document.getElementById('genreOptions').innerHTML = genres.map(g => `<option value="${g}">`).join('');
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function openManualEntry() { openModal({title:"", author:"", date: new Date().toISOString().split('T')[0], genre:"", comment:"", img:"", isbn:""}, -1); }

    function saveData() {
        const genre = document.getElementById('fGenre').value || "未分類";
        if (!genres.includes(genre)) genres.push(genre);
        const data = {
            title: document.getElementById('fTitle').value,
            author: document.getElementById('fAuthor').value,
            date: document.getElementById('fDate').value,
            genre: genre,
            comment: document.getElementById('fComment').value,
            img: document.getElementById('editModal').dataset.img || "",
            isbn: document.getElementById('fIsbn').value
        };
        if (editingIndex > -1) books[editingIndex] = data; else books.unshift(data);
        localStorage.setItem('myBooks', JSON.stringify(books));
        localStorage.setItem('myGenres', JSON.stringify(genres));
        closeModal(); render();
    }

    function deleteBook(idx) {
        if(confirm("このデータを削除してもよろしいですか？")) {
            books.splice(idx, 1);
            localStorage.setItem('myBooks', JSON.stringify(books));
            render();
        }
    }

    function setView(v) { currentView = v; filterDate = null; render(); }

    function render() {
        const listEl = document.getElementById('listDisplay');
        const calArea = document.getElementById('calendarArea');
        const gFilter = document.getElementById('genreFilter').value;
        
        let filtered = books.map((b, i) => ({...b, originalIndex: i}));
        if (gFilter !== 'all') filtered = filtered.filter(b => b.genre === gFilter);

        calArea.classList.toggle('hidden', currentView !== 'calendar');
        if (currentView === 'calendar') {
            renderCalendar();
            const prefix = `${calDate.getFullYear()}-${String(calDate.getMonth() + 1).padStart(2, '0')}`;
            filtered = filterDate ? filtered.filter(b => b.date === filterDate) : filtered.filter(b => b.date.startsWith(prefix));
        }

        if (currentView === 'table') {
            listEl.innerHTML = `<table><thead><tr><th>書影</th><th>情報</th><th>操作</th></tr></thead><tbody>${filtered.map(b => {
                const link = getBookLink(b);
                const titlePart = link ? `<a href="${link}" target="_blank" style="color:var(--primary); font-weight:bold;">${b.title}</a>` : `<b>${b.title}</b>`;
                return `<tr>
                    <td><img src="${b.img || NO_IMAGE_SRC}" style="width:40px;"></td>
                    <td>${titlePart}<br><small>${b.author}</small><br><span style="font-size:10px; color:#666;">${b.date} / ${b.genre}</span><br><span style="font-size:11px;">${b.comment}</span></td>
                    <td><div style="display:flex; flex-direction:column; gap:4px;">
                        <button class="btn btn-sub" style="min-height:30px;" onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})">編集</button>
                        <button class="btn btn-danger" style="min-height:30px;" onclick="deleteBook(${b.originalIndex})">削除</button>
                    </div></td>
                </tr>`;
            }).join('')}</tbody></table>`;
        } else {
            listEl.innerHTML = `<div class="book-grid">${filtered.map(b => {
                const link = getBookLink(b);
                const imgTag = `<img src="${b.img || NO_IMAGE_SRC}">`;
                return `<div class="book-card">
                    ${link ? `<a href="${link}" target="_blank">${imgTag}</a>` : imgTag}
                    <div class="book-info">
                        ${link ? `<a href="${link}" target="_blank" style="color:#333; text-decoration:none;"><b>${b.title}</b></a>` : `<b>${b.title}</b>`}<br>
                        <small>${b.author}</small>
                        <div class="book-meta">${b.date} | ${b.genre}</div>
                        ${b.comment ? `<div class="book-comment">${b.comment}</div>` : ''}
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-sub" onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})">編集</button>
                        <button class="btn btn-danger" onclick="deleteBook(${b.originalIndex})">削除</button>
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        // フィルタ用セレクトボックス更新
        const cur = document.getElementById('genreFilter').value;
        document.getElementById('genreFilter').innerHTML = `<option value="all">すべてのジャンル</option>` + genres.map(g => `<option value="${g}">${g}</option>`).join('');
        document.getElementById('genreFilter').value = cur;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const year = calDate.getFullYear(); const month = calDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${year}年 ${month + 1}月`;
        grid.innerHTML = "";
        const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= last; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = books.filter(b => b.date === dStr).length;
            grid.innerHTML += `<div class="calendar-day ${filterDate===dStr?'active':''}" onclick="filterByDate('${dStr}')">${d}${count>0?`<span class="count-badge">${count}</span>`:''}</div>`;
        }
    }
    function filterByDate(d) { filterDate = filterDate === d ? null : d; render(); }
    function changeMonth(n) { calDate.setMonth(calDate.getMonth() + n); filterDate = null; render(); }

    async function generateShareImage(withCover) {
        const progress = document.getElementById('shareProgress');
        const preview = document.getElementById('sharePreviewArea');
        progress.style.display = 'block'; preview.classList.add('hidden');

        const gFilter = document.getElementById('genreFilter').value;
        const prefix = `${calDate.getFullYear()}-${String(calDate.getMonth() + 1).padStart(2, '0')}`;
        let target = books.filter(b => b.date.startsWith(prefix));
        if (gFilter !== 'all') target = target.filter(b => b.genre === gFilter);
        if (filterDate) target = target.filter(b => b.date === filterDate);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const W = 800;
        const H = withCover ? (Math.ceil(target.length / 3) * 320 + 120) : (target.length * 70 + 120);
        canvas.width = W; canvas.height = H;

        ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = "#1a73e8"; ctx.font = "bold 32px sans-serif";
        ctx.fillText(`📚 読書ログ (${prefix}${filterDate?'-'+filterDate.split('-')[2]:''})`, 40, 60);

        if (withCover) {
            for (let i = 0; i < target.length; i++) {
                const b = target[i];
                const x = 40 + (i % 3) * 250;
                const y = 100 + Math.floor(i / 3) * 320;
                if (b.img) {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(b.img.replace('http://', 'https://'))}`;
                    await new Promise(resolve => {
                        img.onload = () => { ctx.drawImage(img, x, y, 200, 280); resolve(); };
                        img.onerror = () => { ctx.fillStyle="#eee"; ctx.fillRect(x,y,200,280); resolve(); };
                    });
                } else {
                    ctx.fillStyle="#eee"; ctx.fillRect(x,y,200,280);
                }
            }
        } else {
            target.forEach((b, i) => {
                ctx.fillStyle="#333"; ctx.font = "bold 18px sans-serif";
                ctx.fillText(`${b.title} / ${b.author}`, 40, 110 + i * 70);
                ctx.fillStyle="#666"; ctx.font = "14px sans-serif";
                ctx.fillText(`${b.date} | ${b.genre} | ${b.comment}`, 40, 135 + i * 70);
            });
        }

        const dataUrl = canvas.toDataURL('image/png');
        document.getElementById('sharePreviewImg').src = dataUrl;
        document.getElementById('shareDownloadLink').href = dataUrl;
        progress.style.display = 'none'; preview.classList.remove('hidden');
    }

    // CSV入出力などは簡略化して維持
    function exportToCSV() {
        let csv = "タイトル,著者,日付,ジャンル,コメント,ISBN,書影URL\n";
        books.forEach(b => csv += `"${b.title}","${b.author}","${b.date}","${b.genre}","${b.comment}","${b.isbn}","${b.img}"\n`);
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "honlog.csv"; a.click();
    }
    function importFromCSV(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            const rows = f.target.result.split('\n').slice(1);
            rows.forEach(row => {
                const c = row.split('","').map(v => v.replace(/"/g, ""));
                if (c.length >= 7) books.push({title:c[0], author:c[1], date:c[2], genre:c[3], comment:c[4], isbn:c[5], img:c[6]});
            });
            localStorage.setItem('myBooks', JSON.stringify(books)); render();
        };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
