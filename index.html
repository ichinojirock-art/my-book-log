<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Log Ultra V4</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: #333; }
        .hidden { display: none !important; }
        
        /* メインアクションボタン */
        .main-action-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 10px 5px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex: 1; min-height: 44px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-export { border-color: var(--success); color: var(--success); }
        
        /* 検索ボタン */
        .search-box { display: flex; gap: 5px; align-items: flex-start; }
        .btn-search { background: #5f6368; color: white; flex: none; width: 60px; height: 42px; margin-top: 5px; }

        /* 検索結果候補リスト */
        .search-results { background: #f1f3f4; border-radius: 8px; margin-bottom: 15px; max-height: 200px; overflow-y: auto; display: none; border: 1px solid #ddd; }
        .search-item { display: flex; gap: 10px; padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; align-items: center; font-size: 12px; }
        .search-item:last-child { border-bottom: none; }
        .search-item img { width: 35px; height: auto; border-radius: 3px; }
        .search-item:hover { background: #e8f0fe; }

        /* Camera & Modal */
        #interactive.viewport { width: 100%; height: 200px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 15px; }
        .btn-confirm { background: var(--success); color: white; flex: 1; padding: 12px; height: 50px; }
        .btn-cancel { background: var(--danger); color: white; flex: 1; padding: 12px; height: 50px; }

        /* Calendar & Grid */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; }
        .calendar-day { background: white; min-height: 50px; padding: 2px; font-size: 11px; text-align: center; cursor: pointer; }
        .calendar-day.active { background: #e8f0fe; font-weight: bold; border: 2px solid var(--primary); box-sizing: border-box; }
        .count-badge { display: block; background: var(--primary); color: white; border-radius: 10px; font-size: 9px; margin-top: 2px; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .book-card { background: white; padding: 12px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; }
        .book-card img { width: 100%; border-radius: 6px; margin-bottom: 8px; }
        .table-view { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        .table-view td { padding: 8px; border-bottom: 1px solid #eee; }
        .table-thumb { width: 40px; height: auto; border-radius: 3px; }
        .card { background: white; padding: 12px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>📚 My Book Log</h1>

    <div id="mainControls">
        <div class="main-action-grid">
            <button id="scanToggleBtn" class="btn btn-main" onclick="toggleScanner()">📷 スキャン</button>
            <button class="btn btn-sub" onclick="openManualEntry()">✍️ 手動登録</button>
            <button class="btn btn-sub btn-export" onclick="exportToCSV()">📊 CSV出力</button>
        </div>
        <div id="interactive" class="viewport hidden"></div>
        <div class="card">
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <button class="btn btn-sub" onclick="setView('card')">カード</button>
                <button class="btn btn-sub" onclick="setView('table')">表</button>
                <button class="btn btn-sub" onclick="setView('calendar')">カレンダー</button>
            </div>
            <select id="genreFilter" onchange="render()"><option value="all">すべてのジャンル</option></select>
        </div>
    </div>

    <div id="calendarArea" class="card hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button class="btn btn-sub" style="flex:none; padding:5px 15px;" onclick="changeMonth(-1)">◀</button>
            <span id="currentMonthLabel" style="font-weight:bold"></span>
            <button class="btn btn-sub" style="flex:none; padding:5px 15px;" onclick="changeMonth(1)">▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div id="listDisplay"></div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0 0 10px">書籍情報の登録/編集</h3>
            
            <label>作品タイトル</label>
            <div class="search-box">
                <input type="text" id="fTitle" placeholder="タイトルを入力...">
                <button class="btn btn-search" onclick="searchBooksByTitle()">検索</button>
            </div>
            
            <div id="searchResults" class="search-results"></div>

            <label>著者名</label><input type="text" id="fAuthor">
            <label>記録日</label><input type="date" id="fDate">
            <label>ジャンル</label>
            <input type="text" id="fGenre" list="genreOptions" placeholder="選択または入力">
            <datalist id="genreOptions"></datalist>
            <label>コメント</label><textarea id="fComment" rows="2"></textarea>
            
            <div class="modal-footer">
                <button class="btn btn-confirm" onclick="saveData()">保存</button>
                <button class="btn btn-cancel" onclick="closeModal()">中止</button>
            </div>
        </div>
    </div>

<script>
    let books = JSON.parse(localStorage.getItem('myBooks')) || [];
    let genres = JSON.parse(localStorage.getItem('myGenres')) || ["恋愛", "バトル", "ミステリ", "その他"];
    let currentView = 'card';
    let editingIndex = -1; 
    let calDate = new Date();
    let filterDate = null;

    // --- スキャン管理 ---
    function toggleScanner() {
        const el = document.getElementById('interactive');
        if (el.classList.contains('hidden')) startScanner(); else stopScanner();
    }

    function startScanner() {
        document.getElementById('interactive').classList.remove('hidden');
        document.getElementById('scanToggleBtn').innerText = "⏹ 停止";
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader"] }
        }, (err) => { if(!err) Quagga.start(); });
    }

    function stopScanner() {
        Quagga.stop();
        document.getElementById('interactive').classList.add('hidden');
        document.getElementById('scanToggleBtn').innerText = "📷 スキャン";
    }

    Quagga.onDetected(async (data) => {
        const code = data.codeResult.code;
        if (code.startsWith('978')) {
            Quagga.stop();
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${code}`);
            const json = await res.json();
            if (json.items) {
                const info = json.items[0].volumeInfo;
                openModal({ title: info.title, author: info.authors?.[0] || "", date: new Date().toISOString().split('T')[0], img: info.imageLinks?.thumbnail || "", genre: "", comment: "" }, -1);
            } else { alert("見つかりませんでした"); startScanner(); }
        }
    });

    // --- タイトル検索機能 ---
    async function searchBooksByTitle() {
        const title = document.getElementById('fTitle').value;
        const resArea = document.getElementById('searchResults');
        if (!title) return alert("タイトルを入力してください");

        resArea.innerHTML = "<div style='padding:10px'>検索中...</div>";
        resArea.style.display = "block";

        try {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(title)}&maxResults=5`);
            const json = await res.json();
            
            if (json.items) {
                resArea.innerHTML = json.items.map(item => {
                    const info = item.volumeInfo;
                    const img = info.imageLinks?.thumbnail || "";
                    const author = info.authors?.[0] || "不明";
                    return `
                        <div class="search-item" onclick="selectSearchBook('${info.title.replace(/'/g,"")}', '${author.replace(/'/g,"")}', '${img}')">
                            <img src="${img || 'https://via.placeholder.com/35x50'}">
                            <div><strong>${info.title}</strong><br><small>${author}</small></div>
                        </div>`;
                }).join('');
            } else {
                resArea.innerHTML = "<div style='padding:10px'>見つかりませんでした。</div>";
            }
        } catch(e) { resArea.innerHTML = "<div style='padding:10px'>エラーが発生しました。</div>"; }
    }

    function selectSearchBook(title, author, img) {
        document.getElementById('fTitle').value = title;
        document.getElementById('fAuthor').value = author;
        document.getElementById('editModal').dataset.img = img;
        document.getElementById('searchResults').style.display = "none";
    }

    // --- データ操作 ---
    function openManualEntry() { openModal({ title:"", author:"", date: new Date().toISOString().split('T')[0], genre:"", comment:"", img:"" }, -1); }

    function openModal(data, index) {
        editingIndex = index;
        document.getElementById('fTitle').value = data.title;
        document.getElementById('fAuthor').value = data.author;
        document.getElementById('fDate').value = data.date;
        document.getElementById('fGenre').value = data.genre;
        document.getElementById('fComment').value = data.comment;
        document.getElementById('editModal').dataset.img = data.img;
        document.getElementById('searchResults').style.display = "none";
        document.getElementById('editModal').style.display = 'flex';
        updateGenreDatalist();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function saveData() {
        const genre = document.getElementById('fGenre').value;
        if (genre && !genres.includes(genre)) {
            genres.push(genre);
            localStorage.setItem('myGenres', JSON.stringify(genres));
        }
        const data = {
            title: document.getElementById('fTitle').value,
            author: document.getElementById('fAuthor').value,
            date: document.getElementById('fDate').value,
            genre: genre || "未分類",
            comment: document.getElementById('fComment').value,
            img: document.getElementById('editModal').dataset.img || ""
        };
        if (editingIndex > -1) books[editingIndex] = data;
        else books.unshift(data);
        localStorage.setItem('myBooks', JSON.stringify(books));
        closeModal();
        stopScanner();
        render();
    }

    function deleteBook(index) {
        if (confirm("削除しますか？")) {
            books.splice(index, 1);
            localStorage.setItem('myBooks', JSON.stringify(books));
            render();
        }
    }

    // --- 表示ロジック ---
    function setView(v) { currentView = v; filterDate = null; render(); }

    function render() {
        updateGenreFilter();
        const listEl = document.getElementById('listDisplay');
        const calArea = document.getElementById('calendarArea');
        const gFilter = document.getElementById('genreFilter').value;
        let filtered = books.map((b, i) => ({...b, originalIndex: i}));
        if (gFilter !== 'all') filtered = filtered.filter(b => b.genre === gFilter);

        calArea.classList.toggle('hidden', currentView !== 'calendar');
        if (currentView === 'calendar') {
            const prefix = `${calDate.getFullYear()}-${String(calDate.getMonth() + 1).padStart(2, '0')}`;
            filtered = filterDate ? filtered.filter(b => b.date === filterDate) : filtered.filter(b => b.date.startsWith(prefix));
            renderCalendar();
        }

        if (currentView === 'table') {
            listEl.innerHTML = `<table class="table-view">
                ${filtered.map(b => `<tr>
                    <td><img src="${b.img || 'https://via.placeholder.com/40x60'}" class="table-thumb"></td>
                    <td><strong>${b.title}</strong><br><small>${b.author} | ${b.date}</small></td>
                    <td style="text-align:right">
                        <button onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})" class="btn-sm btn-sub">編</button>
                        <button onclick="deleteBook(${b.originalIndex})" class="btn-sm btn-sub" style="color:red">消</button>
                    </td></tr>`).join('')}</table>`;
        } else {
            listEl.innerHTML = `<div class="book-grid">${filtered.map(b => `
                <div class="book-card">
                    <img src="${b.img || 'https://via.placeholder.com/150x200'}">
                    <div class="book-info"><strong>${b.title}</strong><br><small>${b.author}</small><div style="font-size:10px">${b.date} / ${b.genre}</div></div>
                    <div class="actions">
                        <button onclick="openModal(books[${b.originalIndex}], ${b.originalIndex})" class="btn btn-sub btn-sm">編集</button>
                    </div>
                </div>`).join('')}</div>`;
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const year = calDate.getFullYear(); const month = calDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${year}年 ${month + 1}月`;
        grid.innerHTML = "";
        const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= last; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = books.filter(b => b.date === dStr).length;
            grid.innerHTML += `<div class="calendar-day ${filterDate===dStr?'active':''}" onclick="filterByDate('${dStr}')">${d}${count>0?`<span class="count-badge">${count}件</span>`:''}</div>`;
        }
    }

    function filterByDate(d) { filterDate = filterDate === d ? null : d; render(); }
    function changeMonth(n) { calDate.setMonth(calDate.getMonth() + n); filterDate = null; render(); }
    function updateGenreFilter() {
        const sel = document.getElementById('genreFilter');
        const current = sel.value;
        sel.innerHTML = `<option value="all">すべてのジャンル</option>` + genres.map(g => `<option value="${g}">${g}</option>`).join('');
        sel.value = current;
    }
    function updateGenreDatalist() {
        document.getElementById('genreOptions').innerHTML = genres.map(g => `<option value="${g}">${g}</option>`).join('');
    }
    function exportToCSV() {
        let csv = "タイトル,著者,日付,ジャンル,コメント\n";
        books.forEach(b => csv += [b.title, b.author, b.date, b.genre, b.comment].map(v => `"${(v||"").replace(/"/g,'""')}"`).join(",") + "\n");
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "books.csv"; a.click();
    }
    render();
</script>
</body>
</html>
